<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OftalmoClaw</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/theme.css">
    <style>
        body {
            background: linear-gradient(135deg, #1E3A5F 0%, #0F766E 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            text-align: center;
        }
        .login-logo {
            width: 64px;
            height: 64px;
            background: var(--navy);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .login-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 4px;
        }
        .login-subtitle {
            font-size: 14px;
            color: var(--slate-500);
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--slate-600);
            margin-bottom: 6px;
            display: block;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--slate-300);
            border-radius: 8px;
            font-size: 14px;
            font-family: var(--font-sans);
            transition: border-color 0.15s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13,148,136,0.15);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: background 0.15s;
        }
        .login-btn:hover { background: var(--primary-dark); }
        .login-footer {
            margin-top: 24px;
            font-size: 12px;
            color: var(--slate-400);
        }
        .login-footer a { color: var(--primary); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="white" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </div>
        <h1 class="login-title">OftalmoClaw</h1>
        <p class="login-subtitle">Mission Control para Oftalmologia</p>

        <form action="/api/v1/auth/login" method="POST">
            <div class="form-group">
                <label class="form-label">Email ou CRM</label>
                <input type="text" class="form-input" name="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Senha</label>
                <input type="password" class="form-input" name="password" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="login-btn">Entrar</button>
        </form>

        <div class="login-footer">
            <a href="#">Esqueceu a senha?</a> &bull;
            <a href="#">Solicitar acesso</a>
            <br><br>
            by <a href="https://github.com/geekvision">GeekVision</a>
        </div>
    </div>
</body>
</html>
