<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#1E3A5F" stroke="#0D9488" stroke-width="3"/>

  <!-- Eye shape - outer -->
  <path d="M20 60 Q60 25 100 60 Q60 95 20 60Z" fill="none" stroke="#0D9488" stroke-width="3" stroke-linejoin="round"/>

  <!-- Iris -->
  <circle cx="60" cy="60" r="18" fill="#0D9488" opacity="0.3"/>
  <circle cx="60" cy="60" r="18" fill="none" stroke="#0D9488" stroke-width="2.5"/>

  <!-- Pupil -->
  <circle cx="60" cy="60" r="8" fill="#0D9488"/>

  <!-- Light reflection -->
  <circle cx="55" cy="55" r="3" fill="white" opacity="0.8"/>

  <!-- Claw marks (3 diagonal lines) -->
  <line x1="72" y1="38" x2="85" y2="28" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78" y1="42" x2="91" y2="32" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="84" y1="46" x2="97" y2="36" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cross/medical symbol (small) -->
  <rect x="56" y="98" width="8" height="16" rx="1" fill="#0D9488" opacity="0.6"/>
  <rect x="52" y="102" width="16" height="8" rx="1" fill="#0D9488" opacity="0.6"/>
</svg>
